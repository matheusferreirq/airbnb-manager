<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="45" fill="url(#grad1)"/>
  
  <!-- Building/Home icon -->
  <g transform="translate(48, 32)">
    <!-- Roof -->
    <path d="M 24 8 L 48 36 L 0 36 Z" fill="white" opacity="0.95"/>
    
    <!-- Main building -->
    <rect x="12" y="36" width="24" height="32" rx="2" fill="white" opacity="0.9"/>
    
    <!-- Windows -->
    <rect x="16" y="40" width="5" height="5" rx="1" fill="#7c3aed" opacity="0.8"/>
    <rect x="27" y="40" width="5" height="5" rx="1" fill="#7c3aed" opacity="0.8"/>
    
    <rect x="16" y="50" width="5" height="5" rx="1" fill="#7c3aed" opacity="0.8"/>
    <rect x="27" y="50" width="5" height="5" rx="1" fill="#7c3aed" opacity="0.8"/>
    
    <!-- Door -->
    <rect x="21" y="58" width="6" height="10" rx="1" fill="#a855f7" opacity="0.7"/>
  </g>
</svg>